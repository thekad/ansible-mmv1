custom_code:
  custom_import: |
    import re
  pre_read: |
    # extract region from entitytype
    pattern = r"projects/(.+)/locations/(.+)/featurestores/(.+)/entityTypes/(.+)"
    match = re.search(pattern, str(module.params.get("entitytype")))
    if match:
        info.url_params["region"] = match.group(2)
