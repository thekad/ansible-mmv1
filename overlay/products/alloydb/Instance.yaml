---
custom_code:
  custom_import: _drop
  pre_create: _drop
  pre_delete: _drop
examples:
  - name: alloydb_instance_basic
    exclude_test: true
  - name: alloydb_instance_basic_test
    exclude_docs: true
properties:
  - name: instanceType
    required: true
    description: |
      The type of the instance.
      If the instance type is SECONDARY, point to the cluster_type of the associated secondary cluster instead of mentioning SECONDARY.
  - name: connectionPoolConfig
    type: NestedObject
    description: |
      Configuration for Managed Connection Pool.
    properties:
      - name: flags
        type: KeyValuePairs
        description: |
          Flags for configuring managed connection pooling when it is enabled.
          These flags will only be set if `connection_pool_config.enabled` is
          true.
          Please see
          https://cloud.google.com/alloydb/docs/configure-managed-connection-pooling#configuration-options
          for a comprehensive list of flags that can be set.
