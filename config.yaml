# Git settings for the magic-modules repository
git:
  url: https://github.com/GoogleCloudPlatform/magic-modules
  dir: magic-modules
  rev: main
  pull: false

# Optional overlay (layout: products/, templates/) merged over base
# overlay: overlay

# Overwrite existing files
overwrite: true

# Products to generate
# Each product can optionally specify a list of resources.
# If resources is empty or omitted, all resources for that product will be generated.
products:
  - name: alloydb
    resources:
      - Backup
      - Cluster
      - Instance
      - User
  - name: cloudbuildv2
    resources:
      - Connection
      - Repository
  - name: colab
    resources:
      - NotebookExecution
      - Runtime
      - RuntimeTemplate
      - Schedule
  - name: vertexai
    resources:
      - Dataset
      - DeploymentResourcePool
      - Endpoint
      - EndpointWithModelGardenDeployment
      - FeatureGroup
      - FeatureGroupFeature
      - FeatureOnlineStore
      - FeatureOnlineStoreFeatureview
      - Featurestore
      - FeaturestoreEntitytype
      - FeaturestoreEntitytypeFeature
      - Index
      - IndexEndpoint
      - IndexEndpointDeployedIndex
      - MetadataStore
      - RagEngineConfig
      - ReasoningEngine
      - Tensorboard