# Git settings for the magic-modules repository
git:
  url: https://github.com/GoogleCloudPlatform/magic-modules
  dir: magic-modules
  # TODO: kept in sync with go.mod
  rev: 953dea7fa4f7270bf92187ed59fd5395eb327188
  pull: false

# Optional overlay (layout: products/, templates/) merged over base
# overlay: overlay

# Overwrite existing files
overwrite: true

# Products to generate
# Each product can optionally specify:
#   resources   - list of resources to generate (omit or leave empty for all)
#   skip-code   - ['*'] to skip code generation for every resource in the product,
#                 or a list of resource names to skip selectively
#   skip-tests  - ['*'] to skip test generation for every resource in the product,
#                 or a list of resource names to skip selectively
#   skip-info   - ['*'] to skip info module generation for every resource in the product,
#                 or a list of resource names to skip selectively
products:
  - name: alloydb
    resources:
      - Backup
      - Cluster
      - Instance
      - User
  - name: cloudbuild
    skip-tests:
      - "*"
    resources:
      - Trigger
  - name: cloudbuildv2
    skip-tests:
      - "*"
    resources:
      - Connection
      - Repository
  - name: colab
    resources:
      - NotebookExecution
      - Runtime
      - RuntimeTemplate
      - Schedule
  - name: vertexai
    # skip-tests:
    #   - Endpoint   # or skip-tests: ['*'] for all resources
    resources:
      - Dataset
      - DeploymentResourcePool
      - Endpoint
      - EndpointWithModelGardenDeployment
      - FeatureGroup
      - FeatureGroupFeature
      - FeatureOnlineStore
      - FeatureOnlineStoreFeatureview
      - Featurestore
      - FeaturestoreEntitytype
      - FeaturestoreEntitytypeFeature
      - Index
      - IndexEndpoint
      - IndexEndpointDeployedIndex
      - MetadataStore
      - RagEngineConfig
      - ReasoningEngine
      - Tensorboard
